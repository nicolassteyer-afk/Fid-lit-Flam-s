<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flam's Fidelite - Connexion client</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#d8261f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Flam's" />
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body class="client-page client-auth-page" data-page="auth">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Accueil Flam's Fidelite">
        <img class="brand-logo" src="assets/brand/2025-09-FLAMS-Valise-Logo_LOGO-BDX.svg" alt="Flam's" />
        <span>Fidelite</span>
      </a>
      <nav class="main-nav" aria-label="Navigation">
        <a class="is-active" href="index.html">Client</a>
        <a href="restaurant-login.html">Restaurant</a>
        <a href="admin-login.html">Admin</a>
      </nav>
    </header>

    <main class="auth-shell client-auth-shell">
      <div class="client-bg-mark client-bg-mark-dragon" aria-hidden="true"></div>
      <div class="client-bg-mark client-bg-mark-flame" aria-hidden="true"></div>
      <section class="auth-panel client-auth-panel">
        <img class="auth-panel-mark" src="assets/brand/2025-09-FLAMS-Valise-Logo_ILLU-FLAMME-ROUGE.svg" alt="" aria-hidden="true" />
        <p class="eyebrow">Carte digitale</p>
        <h1 class="client-auth-title">Creer ma carte Flam's</h1>
        <p class="lead">Creez votre compte fidelite pour acceder a votre carte digitale et suivre vos tampons.</p>

        <form id="customer-form" class="form">
          <label>
            Prenom
            <input name="firstName" autocomplete="given-name" required />
          </label>
          <label>
            Nom
            <input name="lastName" autocomplete="family-name" required />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Telephone
            <input name="phone" type="tel" autocomplete="tel" required />
          </label>
          <label>
            Mot de passe
            <input name="password" type="password" autocomplete="new-password" minlength="6" required />
          </label>
          <label>
            Restaurant d'inscription
            <select name="restaurantId" id="restaurant-select" required></select>
          </label>
          <label class="check">
            <input name="marketingConsent" type="checkbox" />
            <span>J'accepte de recevoir les offres Flam's.</span>
          </label>
          <button class="primary" type="submit">Creer ma carte</button>
        </form>

        <div class="divider"></div>

        <form id="login-form" class="form compact-form">
          <h2>J'ai deja une carte</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Mot de passe
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="secondary" type="submit">Acceder a ma carte</button>
        </form>
      </section>

      <aside class="auth-visual">
        <div class="wallet-card sample-card">
          <img class="card-deco card-deco-dragon" src="assets/brand/2025-09-FLAMS-Valise-Logo_ILLU-DRAGON-BEIGE.svg" alt="" aria-hidden="true" />
          <img class="card-deco card-deco-flame" src="assets/brand/2025-09-FLAMS-Valise-Logo_ILLU-FLAMME-JAUNE.svg" alt="" aria-hidden="true" />
          <div class="brand-row">
            <div>
              <p class="eyebrow">Apercu</p>
              <h2>Votre carte digitale</h2>
              <p class="card-number">FLAMS-000000</p>
            </div>
            <img class="card-logo" src="assets/brand/2025-09-FLAMS-Valise-Logo_LOGO-BDX.svg" alt="Flam's" />
          </div>
          <div class="reward-row">
            <span>10 tampons = 1 recompense</span>
            <strong>0/10</strong>
          </div>
          <div class="card-mini-scene" aria-hidden="true">
            <img src="assets/brand/2025-09-FLAMS-Valise-Logo_ILLU-BIERE-JAUNE.svg" alt="" />
            <img src="assets/brand/2025-09-FLAMS-Valise-Logo_ILLU-VIN-BEIGE.svg" alt="" />
            <img src="assets/brand/2025-09-FLAMS-Valise-Logo_ILLU-FUT-JAUNE.svg" alt="" />
          </div>
          <div class="stamp-grid client-stamps" id="sample-stamps"></div>
        </div>
      </aside>
    </main>

    <script src="app.js?v=5"></script>
  </body>
</html>
