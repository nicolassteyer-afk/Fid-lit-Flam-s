<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion restaurant - Flam's Fidelite</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#d8261f" />
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body data-page="restaurant-login">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Accueil Flam's Fidelite">
        <img class="brand-logo" src="assets/brand/2025-09-FLAMS-Valise-Logo_LOGO-BDX.svg" alt="Flam's" />
        <span>Fidelite</span>
      </a>
      <nav class="main-nav" aria-label="Navigation">
        <a href="index.html">Client</a>
        <a class="is-active" href="restaurant-login.html">Restaurant</a>
        <a href="admin-login.html">Admin</a>
      </nav>
    </header>

    <main class="login-shell">
      <section class="auth-panel login-panel">
        <p class="eyebrow">Espace restaurant</p>
        <h1>Connexion point de vente</h1>
        <p class="lead">Chaque identifiant ouvre uniquement la base du restaurant associe.</p>

        <form id="restaurant-login-form" class="form">
          <label>
            Identifiant
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            Mot de passe
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">Ouvrir l'espace restaurant</button>
        </form>

        <div class="credential-box">
          <p class="eyebrow">Acces demo</p>
          <div class="credential-grid">
            <span>strasbourg</span><strong>flams-strasbourg</strong>
            <span>lille</span><strong>flams-lille</strong>
            <span>lyon</span><strong>flams-lyon</strong>
            <span>paris</span><strong>flams-paris</strong>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js?v=5"></script>
  </body>
</html>
